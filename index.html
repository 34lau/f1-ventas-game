<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>F1 Sales Grand Prix</title>

  <!-- F1-style fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- GSAP 3 for animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ══ SETUP SCREEN ══════════════════════════════════════════ -->
  <div id="setup-screen"></div>

  <!-- ══ GAME SCREEN ══════════════════════════════════════════ -->
  <div id="game-screen">

    <!-- HUD Top: Group Progress Bar -->
    <div id="hud-top">
      <div id="hud-left">
        <span class="hud-label">META GRUPAL</span>
        <span id="hud-values" class="hud-values">— / —</span>
      </div>
      <div id="progress-track">
        <div id="progress-fill"></div>
        <span id="progress-pct">0%</span>
        <div class="chequered-flag"></div>
      </div>
      <div id="hud-right">
        <button class="ctrl-btn" onclick="toggleSupervisor()" title="Panel Supervisor [S]">PIT WALL</button>
        <button class="ctrl-btn" id="btn-audio" onclick="toggleAudio()">🔊</button>
        <button class="ctrl-btn" onclick="openSetup()">⚙</button>
      </div>
    </div>

    <!-- Main Layout: Circuit + Leaderboard -->
    <div id="main-layout">

      <section id="circuit-section">
         <!-- F1 Official Logo Overlay -->
        <div class="f1-logo-overlay" aria-hidden="true">
          <svg viewBox="0 0 120 48" xmlns="http://www.w3.org/2000/svg" class="f1-svg">
            <!-- F -->
            <polygon points="0,0 38,0 38,10 12,10 12,18 34,18 34,28 12,28 12,48 0,48" fill="#E8002D"/>
            <!-- 1 (negative space trick: white rect + red shape) -->
            <polygon points="44,48 44,10 52,0 72,0 60,10 60,48" fill="#E8002D"/>
            <!-- red background pill -->
            <rect x="76" y="0" width="44" height="48" rx="6" fill="#E8002D"/>
            <!-- white "1" inside pill -->
            <polygon points="90,48 90,14 96,6 108,6 100,14 100,48" fill="#FFFFFF"/>
          </svg>
        </div>
        <canvas id="circuit-canvas"></canvas>
        <div id="notif-banner" class="hidden"></div>
      </section>

      <aside id="leaderboard-section">
        <div id="lb-header">
          <span>P</span>
          <span>PILOTO</span>
          <span>VENTAS</span>
          <span>META</span>
        </div>
        <div id="lb-rows"></div>
        <div id="lb-footer">
          <span id="lb-session-label">SESSION LIVE</span>
          <span class="lb-dot-live"></span>
        </div>
      </aside>

    </div>
  </div>

  <!-- ══ SUPERVISOR MODAL (injected by JS) ═══════════════════ -->
  <div id="supervisor-modal"></div>

  <script src="script.js"></script>
</body>
</html>
